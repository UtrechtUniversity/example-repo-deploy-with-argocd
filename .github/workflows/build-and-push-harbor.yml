name: "Build and Push Docker Image to Harbor"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  PY_COLOR: "1"
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: "Check out repository"
        uses: actions/checkout@v7

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Build image (no push)"
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          provenance: false
          progress: plain

  release:
    name: Version, push and deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "Check out repository"
        uses: actions/checkout@v7

      - name: "Bump patch version"
        id: version
        run: |
          current=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          patch=$((patch + 1))
          new_version="${major}.${minor}.${patch}"
          sed -i "s/^version = \".*\"/version = \"${new_version}\"/" pyproject.toml
          echo "RELEASE_VERSION=${new_version}" >> $GITHUB_OUTPUT
          echo "Building and pushing version: ${new_version}"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Log in to Harbor"
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: "Build and push image"
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/${{ vars.HARBOR_IMAGE_NAME }}:${{ steps.version.outputs.RELEASE_VERSION }}
            ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/${{ vars.HARBOR_IMAGE_NAME }}:latest
          provenance: false
          progress: plain

      - name: "Update image tag in deployment.yaml"
        run: |
          sed -i "s|image: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/${{ vars.HARBOR_IMAGE_NAME }}:.*|image: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/${{ vars.HARBOR_IMAGE_NAME }}:${{ steps.version.outputs.RELEASE_VERSION }}|" openshift/deployment.yaml

      - name: "Commit and push updated deployment.yaml"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openshift/deployment.yaml pyproject.toml
          git commit -m "chore: release ${{ steps.version.outputs.RELEASE_VERSION }}"
          git push
